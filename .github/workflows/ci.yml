name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache: true

      - name: Go tests
        run: go test ./...

      - name: Start stack
        run: docker compose up -d --build mongo api

      - name: Run smoke flow
        run: docker compose --profile test run --rm tester

      - name: Stop stack
        if: always()
        run: docker compose down -v
