apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: sample-atg
  labels:
    app.kubernetes.io/name: sample-atg
    app.kubernetes.io/component: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-atg
      app.kubernetes.io/component: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-atg
        app.kubernetes.io/component: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - --bind_ip_all
          ports:
            - name: mongo
              containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
